<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>avatars</title>
    <meta name="description" content="3D Character Avatars for kyranzo (kyranzoOG / kyranzoog). Interactive WebGL Minecraft skins preview for Java, Bedrock, and MultiCraft." />
    <meta name="keywords" content="kyranzo, kyranzoOG, kyranzoog, kyranzo skin, kyranzo minecraft, kyranzo avatar" />
    <meta name="author" content="kyranzo" />
    <!-- Tailwind CSS import -->
    <link rel="stylesheet" href="/src/index.css" />
    <!-- skinview3d bundled module -->
    <script type="module" src="/src/skinview.ts"></script>
  </head>
  <body class="bg-[#080b12] text-gray-100 min-h-screen bg-dot-matrix relative overflow-x-hidden selection:bg-blue-500 selection:text-white flex flex-col justify-between">

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 glass-card bg-blue-600/90 text-white px-5 py-3 rounded-xl border border-blue-400/40 shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
      <svg class="w-5 h-5 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
      <span id="toast-msg" class="text-xs sm:text-sm font-semibold">Action completed!</span>
    </div>

    <!-- Background glowing ambient lights -->
    <div class="fixed top-20 left-1/4 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[140px] pointer-events-none"></div>
    <div class="fixed bottom-20 right-1/4 w-[500px] h-[500px] bg-cyan-600/10 rounded-full blur-[140px] pointer-events-none"></div>

    <!-- Navigation Bar -->
    <nav class="max-w-7xl mx-auto w-full px-6 py-6 flex items-center justify-between relative z-20">
      <a href="/" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl glass-card border border-white/10 hover:border-blue-500/40 text-xs sm:text-sm font-medium text-gray-300 hover:text-white transition-all hover:-translate-x-1">
        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Home
      </a>
    </nav>

    <!-- Main Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-4 relative z-10 w-full space-y-8">

      <!-- Header Title & Subtitle -->
      <header class="space-y-3">
        <h1 class="text-3xl sm:text-5xl font-black text-white tracking-tight">
          avatars
        </h1>
      </header>

      <!-- 3-Column Character Grid (Java, Bedrock, MultiCraft) -->
      <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- CARD 1: Minecraft Java Edition -->
        <div class="glass-card glass-card-hover rounded-2xl p-5 sm:p-6 border border-white/10 flex flex-col justify-between space-y-4 relative overflow-hidden group">
          
          <!-- Card Header -->
          <div class="flex items-center justify-between border-b border-white/10 pb-3">
            <div>
              <h2 class="text-xl font-bold text-white group-hover:text-blue-300 transition-colors">Java Edition</h2>
            </div>
          </div>

          <!-- Username & Status -->
          <div class="flex items-center justify-between text-xs font-mono bg-black/30 p-2.5 rounded-xl border border-white/5">
            <span class="text-gray-400">Username: <strong class="text-white">kyranzo</strong></span>
          </div>

          <!-- 3D Canvas Box -->
          <div class="w-full h-[380px] bg-[#0e1628] bg-cover bg-center rounded-xl relative border border-white/10 overflow-hidden flex items-center justify-center" style="background-image: url('/minecraftjavabg.png');">
            <canvas id="java-skin-canvas" class="w-full h-full cursor-grab active:cursor-grabbing z-10"></canvas>
            
            <!-- Controls Overlay Hint -->
            <div class="absolute bottom-2 left-2 right-2 bg-black/50 backdrop-blur-md px-3 py-1 rounded-lg text-[10px] text-gray-300 flex items-center justify-between pointer-events-none z-20">
              <span>Orbit: Mouse Drag</span>
              <span>Zoom: Scroll</span>
            </div>
          </div>

          <!-- Single Toggle Control Button -->
          <div class="pt-2">
            <button onclick="toggleRun('java')" id="btn-run-java" class="w-full py-2.5 px-4 rounded-xl bg-blue-600/30 hover:bg-blue-600/50 text-xs font-semibold text-blue-200 border border-blue-500/40 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-lg">
              <span id="label-java">Run</span>
            </button>
          </div>

        </div>

        <!-- CARD 2: Minecraft Bedrock Edition -->
        <div class="glass-card glass-card-hover rounded-2xl p-5 sm:p-6 border border-white/10 flex flex-col justify-between space-y-4 relative overflow-hidden group">
          
          <!-- Card Header -->
          <div class="flex items-center justify-between border-b border-white/10 pb-3">
            <div>
              <h2 class="text-xl font-bold text-white group-hover:text-indigo-300 transition-colors">Bedrock Edition</h2>
            </div>
          </div>

          <!-- Gamertag & Status -->
          <div class="flex items-center justify-between text-xs font-mono bg-black/30 p-2.5 rounded-xl border border-white/5">
            <span class="text-gray-400">Gamertag: <strong class="text-white">kyranzo8221</strong></span>
          </div>

          <!-- 3D Canvas Box -->
          <div class="w-full h-[380px] bg-[#12112a] bg-cover bg-center rounded-xl relative border border-white/10 overflow-hidden flex items-center justify-center" style="background-image: url('/minecraftbedrockbg.png');">
            <canvas id="bedrock-skin-canvas" class="w-full h-full cursor-grab active:cursor-grabbing z-10"></canvas>
            
            <!-- Controls Overlay Hint -->
            <div class="absolute bottom-2 left-2 right-2 bg-black/50 backdrop-blur-md px-3 py-1 rounded-lg text-[10px] text-gray-300 flex items-center justify-between pointer-events-none z-20">
              <span>Orbit: Mouse Drag</span>
              <span>Zoom: Scroll</span>
            </div>
          </div>

          <!-- Single Toggle Control Button -->
          <div class="pt-2">
            <button onclick="toggleRun('bedrock')" id="btn-run-bedrock" class="w-full py-2.5 px-4 rounded-xl bg-indigo-600/30 hover:bg-indigo-600/50 text-xs font-semibold text-indigo-200 border border-indigo-500/40 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-lg">
              <span id="label-bedrock">Run</span>
            </button>
          </div>

        </div>

        <!-- CARD 3: MultiCraft Edition -->
        <div class="glass-card glass-card-hover rounded-2xl p-5 sm:p-6 border border-white/10 flex flex-col justify-between space-y-4 relative overflow-hidden group">
          
          <!-- Card Header -->
          <div class="flex items-center justify-between border-b border-white/10 pb-3">
            <div>
              <h2 class="text-xl font-bold text-white group-hover:text-cyan-300 transition-colors">MultiCraft</h2>
            </div>
          </div>

          <!-- Username & Status -->
          <div class="flex items-center justify-between text-xs font-mono bg-black/30 p-2.5 rounded-xl border border-white/5">
            <span class="text-gray-400">Username: <strong class="text-white">kyranzo</strong></span>
          </div>

          <!-- 3D Canvas Box -->
          <div class="w-full h-[380px] bg-[#0a1828] bg-cover bg-center rounded-xl relative border border-white/10 overflow-hidden flex items-center justify-center" style="background-image: url('/multicraftbg.png');">
            <canvas id="multicraft-skin-canvas" class="w-full h-full cursor-grab active:cursor-grabbing z-10"></canvas>
            
            <!-- Controls Overlay Hint -->
            <div class="absolute bottom-2 left-2 right-2 bg-black/50 backdrop-blur-md px-3 py-1 rounded-lg text-[10px] text-gray-300 flex items-center justify-between pointer-events-none z-20">
              <span>Orbit: Mouse Drag</span>
              <span>Zoom: Scroll</span>
            </div>
          </div>

          <!-- Single Toggle Control Button -->
          <div class="pt-2">
            <button onclick="toggleRun('multicraft')" id="btn-run-multicraft" class="w-full py-2.5 px-4 rounded-xl bg-cyan-600/30 hover:bg-cyan-600/50 text-xs font-semibold text-cyan-200 border border-cyan-500/40 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-lg">
              <span id="label-multicraft">Run</span>
            </button>
          </div>

        </div>

      </section>

    </main>

    <!-- Footer -->
    <footer class="py-6 px-4 text-center text-xs text-gray-500 border-t border-white/5 relative z-10">
      <p>© 2026 kyranzo • 3D Minecraft & MultiCraft Character Showcase</p>
    </footer>
  </body>
</html>
